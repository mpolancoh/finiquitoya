<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #1e3a8a 0%, #1e3a8a 60%, #1d4ed8 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 100px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  /* Subtle grid */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  /* Left accent bar */
  .bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 6px;
    background: #3b82f6;
  }
  /* Right decorative circle */
  .circle {
    position: absolute; right: -120px; top: -120px;
    width: 500px; height: 500px;
    border-radius: 50%;
    border: 60px solid rgba(255,255,255,0.04);
  }
  .circle2 {
    position: absolute; right: 60px; bottom: -160px;
    width: 350px; height: 350px;
    border-radius: 50%;
    border: 40px solid rgba(255,255,255,0.03);
  }
  .content { position: relative; z-index: 1; }
  .logo {
    font-size: 92px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 24px;
    letter-spacing: -2px;
  }
  .logo .white { color: #ffffff; }
  .logo .blue  { color: #93c5fd; }
  .tagline {
    font-size: 34px;
    color: #bfdbfe;
    font-weight: 400;
    margin-bottom: 14px;
    line-height: 1.3;
  }
  .sub {
    font-size: 26px;
    color: #5b7fc4;
    font-weight: 400;
    margin-bottom: 48px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    background: rgba(255,255,255,0.10);
    border-radius: 100px;
    padding: 10px 28px;
    font-size: 22px;
    color: #93c5fd;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="bar"></div>
  <div class="circle"></div>
  <div class="circle2"></div>
  <div class="content">
    <div class="logo">
      <span class="white">Finiquito</span><span class="blue">Ya</span>
    </div>
    <div class="tagline">Calcula tu liquidación laboral gratis</div>
    <div class="sub">México · Colombia · Venezuela</div>
    <div class="pill">finiquitoya.app</div>
  </div>
</div>
</body>
</html>
